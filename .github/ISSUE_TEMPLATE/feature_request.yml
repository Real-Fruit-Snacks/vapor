name: Feature Request
description: Suggest a new feature for Vapor
labels: ["enhancement"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting a feature. Please describe your idea below.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: "A clear and concise description of the feature"
      placeholder: "Add support for..."
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: "Describe the scenario where this feature would be useful"
      placeholder: "During a penetration test, I need to..."
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: "How do you think this should work?"
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: "Any alternative approaches you have considered"
    validations:
      required: false
