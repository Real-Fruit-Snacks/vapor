name: Bug Report
description: Report a bug in Vapor
labels: ["bug"]

body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the information below to help us investigate.

  - type: input
    id: version
    attributes:
      label: Vapor Version
      description: "Commit hash or release tag"
      placeholder: "main / v0.1.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Target OS / Platform
      description: "Target operating system and architecture"
      placeholder: "Windows 11 x86_64 / Windows Server 2022"
    validations:
      required: true

  - type: input
    id: toolchain
    attributes:
      label: Build Toolchain
      description: "NASM version and linker"
      placeholder: "NASM 2.16.01 / x86_64-w64-mingw32-ld 2.41"
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: "Which component is affected?"
      options:
        - Implant (vapor.asm)
        - Injector (injector.asm)
        - Listener (listener.py)
        - Build system (Makefile / build.sh)
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: "Provide the exact steps to reproduce the bug"
      placeholder: |
        1. Build with `./build.sh 10.10.14.1 443`
        2. Start listener with `python3 listener.py --lport 443 --key <key>`
        3. Run `vapor.exe` on target
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: "What did you expect to happen?"
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: "What actually happened?"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Output
      description: "Paste any relevant logs, error messages, or terminal output"
      render: shell
    validations:
      required: false
