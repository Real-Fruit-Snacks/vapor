<svg xmlns="http://www.w3.org/2000/svg" width="800" height="290" viewBox="0 0 800 290">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#11111b"/>
      <stop offset="50%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#89b4fa"/>
      <stop offset="35%" style="stop-color:#74c7ec"/>
      <stop offset="65%" style="stop-color:#94e2d5"/>
      <stop offset="100%" style="stop-color:#a6e3a1"/>
    </linearGradient>
    <linearGradient id="accent-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#89b4fa;stop-opacity:0"/>
      <stop offset="20%" style="stop-color:#89b4fa"/>
      <stop offset="50%" style="stop-color:#74c7ec"/>
      <stop offset="80%" style="stop-color:#a6e3a1"/>
      <stop offset="100%" style="stop-color:#a6e3a1;stop-opacity:0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="290" rx="12" fill="url(#bg)"/>

  <!-- Subtle border -->
  <rect width="800" height="290" rx="12" fill="none" stroke="#45475a" stroke-width="1"/>

  <!-- Decorative vapor wisps (top-right) -->
  <g opacity="0.07" transform="translate(670, 60)">
    <path d="M0,0 Q15,-20 30,-5 Q45,10 60,-10 Q75,-30 90,-15" fill="none" stroke="#89b4fa" stroke-width="1.5"/>
    <path d="M5,15 Q20,-5 35,10 Q50,25 65,5 Q80,-15 95,0" fill="none" stroke="#74c7ec" stroke-width="1.5"/>
    <path d="M10,30 Q25,10 40,25 Q55,40 70,20 Q85,0 100,15" fill="none" stroke="#94e2d5" stroke-width="1.5"/>
  </g>

  <!-- Secondary vapor wisps (bottom-left) -->
  <g opacity="0.05" transform="translate(50, 180)">
    <path d="M0,0 Q20,-15 40,0 Q60,15 80,-5" fill="none" stroke="#74c7ec" stroke-width="1.5"/>
    <path d="M5,15 Q25,0 45,15 Q65,30 85,10" fill="none" stroke="#94e2d5" stroke-width="1.5"/>
  </g>

  <!-- Decorative dots pattern -->
  <g opacity="0.08">
    <circle cx="60" cy="45" r="1.5" fill="#89b4fa"/>
    <circle cx="80" cy="40" r="1" fill="#74c7ec"/>
    <circle cx="100" cy="50" r="1.5" fill="#94e2d5"/>
    <circle cx="75" cy="60" r="1" fill="#a6e3a1"/>
    <circle cx="95" cy="33" r="1" fill="#89b4fa"/>
    <circle cx="115" cy="43" r="1.5" fill="#74c7ec"/>
    <circle cx="40" cy="53" r="1" fill="#94e2d5"/>
    <circle cx="120" cy="57" r="1" fill="#b4befe"/>
    <circle cx="50" cy="35" r="1.5" fill="#89b4fa"/>
    <circle cx="130" cy="37" r="1" fill="#74c7ec"/>
    <circle cx="710" cy="215" r="1.5" fill="#94e2d5"/>
    <circle cx="690" cy="225" r="1" fill="#89b4fa"/>
    <circle cx="730" cy="230" r="1.5" fill="#74c7ec"/>
    <circle cx="705" cy="240" r="1" fill="#a6e3a1"/>
    <circle cx="675" cy="220" r="1" fill="#94e2d5"/>
    <circle cx="740" cy="220" r="1" fill="#89b4fa"/>
  </g>

  <!-- Title -->
  <text x="400" y="130" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace"
        font-size="72" font-weight="bold" fill="url(#title-grad)" text-anchor="middle"
        letter-spacing="14" filter="url(#glow)">VAPOR</text>

  <!-- Accent line under title -->
  <rect x="220" y="148" width="360" height="2" rx="1" fill="url(#accent-line)"/>

  <!-- Subtitle -->
  <text x="400" y="180" font-family="'SF Mono','Fira Code','JetBrains Mono','Cascadia Code',Consolas,monospace"
        font-size="13" fill="#a6adc8" text-anchor="middle"
        letter-spacing="4">ENCRYPTED ASSEMBLY REVERSE SHELL</text>

  <!-- Feature badges — row 1 -->
  <g transform="translate(108, 205)">
    <!-- chacha20-poly1305 -->
    <rect x="0" y="0" width="165" height="28" rx="14" fill="#313244"/>
    <rect x="0" y="0" width="165" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="18" cy="14" r="4" fill="#a6e3a1"/>
    <text x="30" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">chacha20-poly1305</text>

    <!-- pic shellcode -->
    <rect x="180" y="0" width="130" height="28" rx="14" fill="#313244"/>
    <rect x="180" y="0" width="130" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="198" cy="14" r="4" fill="#89b4fa"/>
    <text x="210" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">pic shellcode</text>

    <!-- ~3.6 KB -->
    <rect x="325" y="0" width="100" height="28" rx="14" fill="#313244"/>
    <rect x="325" y="0" width="100" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="343" cy="14" r="4" fill="#f38ba8"/>
    <text x="355" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">~3.6 KB</text>

    <!-- hell's gate -->
    <rect x="440" y="0" width="130" height="28" rx="14" fill="#313244"/>
    <rect x="440" y="0" width="130" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="458" cy="14" r="4" fill="#f38ba8"/>
    <text x="470" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">hell's gate</text>
  </g>

  <!-- Feature badges — row 2 -->
  <g transform="translate(208, 240)">
    <!-- x86_64 -->
    <rect x="0" y="0" width="100" height="28" rx="14" fill="#313244"/>
    <rect x="0" y="0" width="100" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="18" cy="14" r="4" fill="#74c7ec"/>
    <text x="30" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">x86_64</text>

    <!-- indirect syscalls -->
    <rect x="115" y="0" width="160" height="28" rx="14" fill="#313244"/>
    <rect x="115" y="0" width="160" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="133" cy="14" r="4" fill="#cba6f7"/>
    <text x="145" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">indirect syscalls</text>

    <!-- no deps -->
    <rect x="290" y="0" width="100" height="28" rx="14" fill="#313244"/>
    <rect x="290" y="0" width="100" height="28" rx="14" fill="none" stroke="#45475a" stroke-width="0.5"/>
    <circle cx="308" cy="14" r="4" fill="#fab387"/>
    <text x="320" y="18" font-family="'SF Mono','Fira Code','JetBrains Mono',Consolas,monospace"
          font-size="11" fill="#cdd6f4">no deps</text>
  </g>
</svg>
