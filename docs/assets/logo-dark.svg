<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" fill="none">
  <defs>
    <!-- Primary gradient: red to maroon -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#f38ba8"/>
      <stop offset="40%" stop-color="#f38ba8"/>
      <stop offset="100%" stop-color="#eba0ac"/>
    </linearGradient>

    <!-- Accent gradient: maroon to red -->
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#eba0ac"/>
      <stop offset="100%" stop-color="#f38ba8"/>
    </linearGradient>

    <!-- Icon gradient: vertical for the mark -->
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#f38ba8"/>
      <stop offset="50%" stop-color="#f38ba8"/>
      <stop offset="100%" stop-color="#eba0ac"/>
    </linearGradient>

    <!-- Wisp gradient: fades out upward -->
    <linearGradient id="g4" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#f38ba8" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#eba0ac" stop-opacity="0.1"/>
    </linearGradient>

    <!-- Faint outer glow -->
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#f38ba8" flood-opacity="0.15" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>

    <!-- Source point glow -->
    <filter id="sourceglow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- ===================== LOGOMARK ===================== -->
  <g transform="translate(58, 40)" filter="url(#softglow)">

    <!-- Hexagonal frame — thin, elegant -->
    <path d="M 80 6 L 140 38 L 140 102 L 80 134 L 20 102 L 20 38 Z"
          fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.4"/>

    <!-- Inner hex subtle fill -->
    <path d="M 80 14 L 134 42 L 134 98 L 80 126 L 26 98 L 26 42 Z"
          fill="#f38ba8" opacity="0.04"/>

    <!-- Central source point at bottom-center (bright, glowing) -->
    <circle cx="80" cy="110" r="5" fill="#f38ba8" opacity="0.9" filter="url(#sourceglow)"/>
    <circle cx="80" cy="110" r="2.5" fill="#1e1e2e"/>
    <circle cx="80" cy="110" r="8" fill="none" stroke="#f38ba8" stroke-width="0.5" opacity="0.3"/>

    <!-- Vapor wisp 1: center-left rising -->
    <path d="M 80 108 C 75 90, 60 75, 55 45"
          stroke="url(#g4)" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.5"/>

    <!-- Vapor wisp 2: center rising -->
    <path d="M 80 108 C 82 85, 78 60, 80 30"
          stroke="url(#g4)" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.4"/>

    <!-- Vapor wisp 3: center-right rising -->
    <path d="M 80 108 C 85 90, 98 70, 105 42"
          stroke="url(#g4)" stroke-width="1" stroke-linecap="round" fill="none" opacity="0.45"/>

    <!-- Rising particle 1: large, near source -->
    <circle cx="72" cy="88" r="3" fill="#f38ba8" opacity="0.85"/>

    <!-- Rising particle 2 -->
    <circle cx="80" cy="72" r="2.8" fill="#f38ba8" opacity="0.7"/>

    <!-- Rising particle 3 -->
    <circle cx="90" cy="65" r="2.5" fill="#eba0ac" opacity="0.6"/>

    <!-- Rising particle 4 -->
    <circle cx="60" cy="55" r="2.2" fill="#eba0ac" opacity="0.5"/>

    <!-- Rising particle 5: smaller, fading -->
    <circle cx="82" cy="42" r="1.8" fill="#eba0ac" opacity="0.35"/>

    <!-- Rising particle 6: very small, near top -->
    <circle cx="100" cy="48" r="1.5" fill="#eba0ac" opacity="0.25"/>

    <!-- Rising particle 7: faintest, highest -->
    <circle cx="68" cy="32" r="1.2" fill="#eba0ac" opacity="0.2"/>

    <!-- Corner accents on hex -->
    <circle cx="80" cy="6" r="2" fill="#f38ba8" opacity="0.3"/>
    <circle cx="80" cy="134" r="2" fill="#eba0ac" opacity="0.3"/>
  </g>

  <!-- ===================== TYPOGRAPHY ===================== -->

  <!-- "VAPOR" — clean, bold, wide-tracked -->
  <text x="415" y="108"
        font-family="'SF Pro Display', 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="76" font-weight="800" letter-spacing="18"
        fill="url(#g1)" text-anchor="middle">VAPOR</text>

  <!-- Thin separator line -->
  <line x1="280" y1="128" x2="550" y2="128"
        stroke="url(#g1)" stroke-width="0.8" opacity="0.25"/>

  <!-- Tagline — refined, subtle -->
  <text x="415" y="152"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="11.5" font-weight="400" letter-spacing="5.5"
        fill="#7f849c" text-anchor="middle">ENCRYPTED SHELL + PROCESS INJECTOR</text>

  <!-- Version / descriptor — very subtle -->
  <text x="415" y="172"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="400" letter-spacing="3"
        fill="#585b70" text-anchor="middle">NASM  ·  CHACHA20  ·  HELL'S GATE</text>
</svg>
